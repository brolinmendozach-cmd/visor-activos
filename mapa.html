<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Visor Activos UEFSFA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
padding:0;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===============================
CREAR MAPA
=============================== */

var map = L.map('map').setView([-9.19,-75.015],6);



/* ===============================
MAPA BASE SATELITAL
=============================== */

var satellite = L.tileLayer(
'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
{
maxZoom:20,
subdomains:['mt0','mt1','mt2','mt3']
}
).addTo(map);



/* ===============================
CAPA WMS ACTIVOS
=============================== */

var activos = L.tileLayer.wms(
"https://gymnogenous-unarticulatory-kristen.ngrok-free.dev/geoserver/wms",
{
layers: "activos:activos_puntos",
format: "image/png",
transparent: true,
version: "1.1.1"
}
).addTo(map);



/* ===============================
CONTROL DE CAPAS
=============================== */

var baseMaps = {

"Google Satellite": satellite

};

var overlayMaps = {

"Activos": activos

};

L.control.layers(baseMaps,overlayMaps).addTo(map);



/* ===============================
ESCALA DEL MAPA
=============================== */

L.control.scale().addTo(map);

</script>

</body>
</html>
