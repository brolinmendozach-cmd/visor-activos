<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">
<title>Geoportal de Activos</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
}

#map{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =========================
// CREAR MAPA
// =========================

var map = L.map('map').setView([-9.19,-75.015],6);


// =========================
// MAPAS BASE
// =========================

// Satélite (Esri)

var satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
maxZoom:19,
attribution:'Tiles © Esri'
}).addTo(map);


// OpenStreetMap (opcional)

var osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap'
});


// =========================
// CAPAS GEOSERVER
// =========================

var activos = L.tileLayer.wms(
"http://localhost:8081/geoserver/wms",{
layers:'activos:activos_puntos',
format:'image/png',
transparent:true
});

var departamentos = L.tileLayer.wms(
"http://localhost:8081/geoserver/wms",{
layers:'peru:DEPARTAMENTOS',
format:'image/png',
transparent:true
});

var provincias = L.tileLayer.wms(
"http://localhost:8081/geoserver/wms",{
layers:'peru:PROVINCIAS',
format:'image/png',
transparent:true
});

var distritos = L.tileLayer.wms(
"http://localhost:8081/geoserver/wms",{
layers:'peru:DISTRITOS',
format:'image/png',
transparent:true
});


// =========================
// CONTROL DE CAPAS
// =========================

var baseMaps = {

"Satélite": satellite,
"OpenStreetMap": osm

};

var overlayMaps = {

"Activos": activos,
"Departamentos": departamentos,
"Provincias": provincias,
"Distritos": distritos

};

L.control.layers(baseMaps, overlayMaps).addTo(map);


// activar capa inicial

activos.addTo(map);

</script>

</body>
</html>
