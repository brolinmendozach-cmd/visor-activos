<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Visor Activos</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0}
#map{height:100vh;width:100%}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map',{
center:[-9.19,-75.015],
zoom:6
});


/* BASE SATELITAL */

var satelite = L.tileLayer(
'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
{
maxZoom:20,
subdomains:['mt0','mt1','mt2','mt3']
}
).addTo(map);



/* WMS ACTIVOS */

var activos = L.tileLayer.wms(
"https://gymnogenous-unarticulatory-kristen.ngrok-free.dev/geoserver/activos/wms",
{
layers:"activos:activos_puntos",
format:"image/png",
transparent:true,
version:"1.1.1",
crs: L.CRS.EPSG4326
}
).addTo(map);



/* CONTROL */

L.control.layers(
{"Satelite":satelite},
{"Activos":activos}
).addTo(map);

</script>

</body>
</html>
