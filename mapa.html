<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test WMS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-9,-75],6);

/* MAPA BASE OSM */

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


/* WMS */

var activos = L.tileLayer.wms(
"https://gymnogenous-unarticulatory-kristen.ngrok-free.dev/geoserver/wms",
{
layers:"activos:activos_puntos",
format:"image/png",
transparent:true,
version:"1.1.1"
}
).addTo(map);

</script>

</body>
</html>
